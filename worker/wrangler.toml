# Cloudflare Worker für den Hosted-Modus (Plan A.2). Deploy via Wrangler, unabhängig
# vom GitHub-Pages-Deploy der PWA (sw.js/__BUILD__ bleiben unberührt).
#
# Secrets NICHT hier, sondern via `wrangler secret put`:
#   wrangler secret put OPENROUTER_KEY
#   wrangler secret put TURNSTILE_SECRET
#
# Lokaler Lauf ohne echte Kosten/Secrets: .dev.vars (s. .dev.vars.example) mit
#   MOCK_UPSTREAM=1 und SKIP_TURNSTILE=1, dann `wrangler dev`.

name = "jobreif-hosted"
main = "src/index.js"
compatibility_date = "2026-05-01"

# Custom Domain api.jobreif.de für den Worker. Greift erst, wenn die Zone jobreif.de
# auf Cloudflare AKTIV ist (NS-Umzug durch). Dann legt `wrangler deploy` den
# Custom-Domain-Eintrag automatisch an. Läuft man `wrangler deploy` VOR der Aktivierung,
# schlägt nur diese Route fehl — dann diese drei Zeilen kurz auskommentieren.
[[routes]]
pattern = "api.jobreif.de"
custom_domain = true

[vars]
ALLOWED_ORIGINS = "https://jobreif.de"
DAY_BUDGET_USD = "5"          # harte Tagesgrenze (USD), bewusst niedrig starten
HARD_CAP_TOKENS = "24000"     # Output-Cap je Call; bestimmt die Worst-Case-Reserve.
                              # 24k statt 18k: Puffer für reasoning-schwere Vertiefungs-
                              # Läufe (Golden-Set 17.06.2026 zeigte seltene Truncation bei 18k).
MAX_INFLIGHT = "4"            # globaler Concurrency-Cap (Parallel-Durchbruch begrenzen)
RESERVE_TTL_S = "1200"        # erst nach dieser Zeit ohne Settle gilt eine Reserve als
                              # verwaist und wird reconciled. BEWUSST über JEDER moeglichen
                              # Server-Ausfuehrungsdauer (Async-Alarm-Wall 15 min, Stream-
                              # reasoning ~150s), sonst räumt ein paralleler Request eine
                              # noch laufende Reservierung weg und der echte usage.cost geht
                              # verloren bzw. das Pro-Nutzer-Gate gibt einen aktiven Job frei
                              # (Codex-Review R2). Greift nur noch bei echtem Worker-Abbruch.
ALERT_AT = "0.7"             # nur Benachrichtigung (KEIN stilles Modell-Downgrade, s. Plan A.7)
PER_SUBJECT_SHARE = "0.15"    # kein Subjekt (IP/ASN/Device) > 15 % des Tagesbudgets
PER_IP_DAY = "8"             # harte Obergrenze Durchläufe/Tag/IP
ALLOW_PAID = "0"            # Phase A: "Beste"/Opus hinter der Paywall → 402
# Dev-Flags (in Produktion NICHT setzen): MOCK_UPSTREAM, SKIP_TURNSTILE, MOCK_COST

[[durable_objects.bindings]]
name = "BUDGET_DO"
class_name = "BudgetDO"

[[durable_objects.bindings]]
name = "GENJOB_DO"
class_name = "GenerationJobDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["BudgetDO"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["GenerationJobDO"]
