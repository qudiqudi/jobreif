name: CI

on:
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: JavaScript-Syntax prüfen
        run: |
          node --check app.js
          node --check sw.js
          node --check scripts/generate-seo.mjs
          node --check assets/sync-crypto.js
          node --check assets/sync-qr.js
          node --check assets/vendor/qrcodegen.js

      - name: Geräte-Sync Krypto-Layer (Roundtrip/kid/Fragment) prüfen
        run: node test/sync-crypto.test.js

      - name: Geräte-Sync QR-Renderer (SVG aus Modul-Matrix) prüfen
        run: node test/sync-qr.test.js

      - name: Geräte-Sync Merge-Kern (Konflikt-Matrix + Lattice-Eigenschaften) prüfen
        run: node test/sync-merge.test.js

      - name: Fremd-JS-Wächter (Regelwerk) prüfen
        run: node test/check-no-foreign-js.test.js

      - name: Asset- und Manifest-Integrität prüfen
        run: node .github/scripts/check-integrity.js

      - name: Keine Interna im öffentlichen Repo
        run: node .github/scripts/check-no-internals.js

      - name: Erwähnte JS-Dateinamen existieren im Repo
        run: node .github/scripts/check-no-foreign-js.js

      - name: SEO-Output ist aktuell (kein Drift zum Katalog)
        run: |
          node scripts/generate-seo.mjs
          if ! git diff --quiet -- einstellungstest sitemap.xml; then
            echo "Generiertes SEO-Output weicht vom committeten Stand ab."
            echo "Bitte 'node scripts/generate-seo.mjs' lokal laufen lassen und committen."
            git --no-pager diff --stat -- einstellungstest sitemap.xml
            exit 1
          fi
