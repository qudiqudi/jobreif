name: Deploy zu GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  checks:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: checks
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Cache-Version aus Commit-Hash setzen
        run: sed -i "s/__BUILD__/${GITHUB_SHA:0:8}/" sw.js

      # Pages liefert den hochgeladenen Ordner KOMPLETT aus (nur Dot-Verzeichnisse
      # wie .github fallen raus). Ohne diesen Schritt stehen Entwickler-Dateien auf
      # der Produktionsdomain, z. B. https://jobreif.de/CLAUDE.md. Entfernt wird nur,
      # was die ausgelieferte App nachweislich nicht braucht: keine der Dateien steht
      # in der ASSETS-Liste von sw.js, keine wird von einer HTML-Seite referenziert,
      # und keine wird zur Laufzeit geladen. Der CI-Job `checks` hat einen eigenen
      # Checkout und sieht scripts/ und seo/ weiterhin (SEO-Drift-Prüfung).
      - name: Nicht-Web-Dateien aus dem Pages-Artefakt entfernen
        run: rm -rf CLAUDE.md test scripts seo

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v5

  # Reicht die Sitemap nach einem Deploy per Search-Console-API neu ein, wenn
  # sie sich geändert hat (Google lädt sie dann zeitnah neu). Ohne konfigurierte
  # GSC_*-Secrets ist das Skript ein No-op und der Job bleibt grün.
  submit-sitemap:
    needs: deploy
    # Nur auf main — verhindert, dass ein manueller workflow_dispatch auf einem
    # anderen Branch dessen Skript-Version mit den Repo-Secrets ausfuehrt.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # fetch-depth: 0 → volle History, damit der Vergleich gegen den Push-Vorstand
      # (github.event.before) auch mehrere Commits pro Push zuverlaessig abdeckt.
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Prüfen, ob sich sitemap.xml in diesem Push geändert hat
        id: diff
        env:
          BEFORE: ${{ github.event.before }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"    # manueller Trigger = absichtlich einreichen
          elif [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"    # kein Vorstand greifbar (neuer Branch) -> lieber einmal zu viel (Submit ist idempotent)
          elif git diff --quiet "$BEFORE" "$GITHUB_SHA" -- sitemap.xml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"   # sitemap.xml im ganzen Push unveraendert
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v5
        if: steps.diff.outputs.changed == 'true'
        with:
          node-version: '20'

      - name: Sitemap bei der Search Console neu einreichen
        if: steps.diff.outputs.changed == 'true'
        # Optionale GSC_SITE/GSC_SITEMAP/GSC_QUOTA_PROJECT werden mitgereicht; sind
        # sie nicht als Secret gesetzt, sind sie leer und das Skript nimmt seine Defaults.
        env:
          GSC_CLIENT_ID: ${{ secrets.GSC_CLIENT_ID }}
          GSC_CLIENT_SECRET: ${{ secrets.GSC_CLIENT_SECRET }}
          GSC_REFRESH_TOKEN: ${{ secrets.GSC_REFRESH_TOKEN }}
          GSC_SITE: ${{ secrets.GSC_SITE }}
          GSC_SITEMAP: ${{ secrets.GSC_SITEMAP }}
          GSC_QUOTA_PROJECT: ${{ secrets.GSC_QUOTA_PROJECT }}
        run: node scripts/gsc-submit.mjs
