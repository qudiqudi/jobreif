name: Claude Review (PR + Issue)

# On-Demand: läuft, wenn jemand "@claude" in einen Kommentar schreibt — entweder auf
# einem Pull Request (Code-Review, Job `review`) ODER auf einem reinen Issue
# (Assistent, Job `issue`). Nicht automatisch beim Öffnen.
#
# issue_comment läuft im Kontext des BASIS-Repos und hat daher Zugriff auf die
# Secrets (CLAUDE_CODE_OAUTH_TOKEN), auch wenn ein PR aus einem Fork kommt.
#
# SICHERHEIT (gilt für BEIDE Jobs):
#   - Nur Kommentare von OWNER/MEMBER/COLLABORATOR lösen einen Lauf aus, damit nicht
#     beliebige Dritte über @claude Läufe (und damit Token-/Kosten-Verbrauch)
#     auslösen können. Soll der PR-Autor (Fork) sich selbst auslösen dürfen, unten
#     "CONTRIBUTOR" zur Liste hinzufügen.
#   - Es wird KEIN ungeprüfter Fork-Code ausgecheckt oder ausgeführt; gearbeitet wird
#     read-only über die API (`gh pr diff` bzw. `gh issue view`). Claudes Tools sind
#     auf Lesen + die zum Posten nötigen gh-Befehle beschränkt (Allowlist je Job).

on:
  issue_comment:
    types: [created]

# Permissions werden je Job least-privilege gesetzt (review: PRs, issue: Issues),
# damit kein Job mehr Schreibrechte hat als er braucht.

concurrency:
  group: claude-review-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  review:
    # Nur auf PR-Kommentaren (kein reines Issue), die "@claude" enthalten, von
    # vertrauenswürdigen Absendern.
    if: >-
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@claude') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # PR-Kommentar posten
      id-token: write # Fallback für die OIDC-App-Token-Exchange-Variante
    steps:
      # Basis-Repo (für CLAUDE.md / Kontext). Der PR-Stand wird NICHT ausgecheckt;
      # Claude liest das Diff über die API (gh pr diff).
      - name: Checkout base
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Claude review
        uses: anthropics/claude-code-action@700e7f8316990de46bed556429765647af760efc # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Direkt der Workflow-Token zum Posten → kein Claude-GitHub-App-Token-Exchange nötig.
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Du bist Code-Reviewer für Pull Request #${{ github.event.issue.number }}
            in ${{ github.repository }}. Ausgelöst per @claude-Kommentar.

            Vorgehen:
            - Hol dir das Diff mit `gh pr diff ${{ github.event.issue.number }}` (zeigt auch
              vollständig neu hinzugefügte Dateien). Nutze `gh pr view` für Titel/Beschreibung.
            - Halte dich an die Regeln in `CLAUDE.md` (im Root) — prüfe insbesondere keine
              Breaking Changes, abwärtskompatible Storage-Formate, Versions-/Changelog-Ritual,
              CSP-/Sicherheitsannahmen.

            WICHTIG (Sicherheit): Dies ist ein Review von möglicherweise nicht vertrauens-
            würdigem Fork-Code. Führe KEINEN Projektcode aus, baue/installiere nichts, starte
            keine Skripte. Nur das Diff lesen und bewerten.

            Sei knapp und hochsignalig: melde nur Probleme, bei denen du dir sicher bist
            (Bugs, Sicherheits-/Korrektheitsprobleme, CLAUDE.md-Verstöße). Lass Nitpicks weg.
            Poste das Ergebnis als EINEN PR-Kommentar via
            `gh pr comment ${{ github.event.issue.number }} --body "..."`.
            Wenn du nichts findest, schreib das kurz.
          # Tool-Allowlist als JSON (settings-Input) statt über --allowed-tools: so umgeht
          # man das Shell-Splitting von claude_args, das an Leerzeichen in Mustern wie
          # "Bash(gh pr diff:*)" scheitert. Eng gefasst auf genau die benötigten gh-Befehle
          # — KEIN Bash(gh:*) (das würde gh api + alle Schreib-Subkommandos erlauben).
          settings: |
            {
              "permissions": {
                "allow": [
                  "Read",
                  "Grep",
                  "Glob",
                  "Bash(gh pr diff:*)",
                  "Bash(gh pr view:*)",
                  "Bash(gh pr comment:*)"
                ]
              }
            }
          claude_args: --model claude-opus-4-8 --max-turns 25

  issue:
    # Spiegelbild zum review-Job, aber für REINE Issues (kein PR): Kommentare mit
    # "@claude" von vertrauenswürdigen Absendern. github.event.issue.pull_request ist
    # bei einem reinen Issue leer → nur dann läuft dieser Job (und review läuft nicht).
    if: >-
      !github.event.issue.pull_request &&
      contains(github.event.comment.body, '@claude') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write # Issue-Kommentar posten
      id-token: write # Fallback für die OIDC-App-Token-Exchange-Variante
    steps:
      # Basis-Repo für CLAUDE.md / Code-Kontext (vertrauenswürdiger Stand, kein Fork-Code).
      - name: Checkout base
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Claude issue assistant
        uses: anthropics/claude-code-action@700e7f8316990de46bed556429765647af760efc # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Nur die numerische Issue-Nummer wird interpoliert (nicht injizierbar). Freitext
          # (comment.body/title) wird NICHT in den Prompt/Run gezogen — Claude liest den
          # Issue-Inhalt selbst read-only via `gh issue view`.
          prompt: |
            Du bist ein Assistent für Issue #${{ github.event.issue.number }}
            in ${{ github.repository }}. Ausgelöst per @claude-Kommentar.

            Vorgehen:
            - Lies das Issue inkl. Verlauf mit
              `gh issue view ${{ github.event.issue.number }} --comments`.
            - Beantworte die konkrete Frage/Aufgabe aus dem auslösenden @claude-Kommentar.
            - Du darfst den Repo-Code READ-ONLY lesen (Read/Grep/Glob), um fundiert zu
              antworten (z. B. ein Ticket gegen den echten Code prüfen/verfeinern). Halte
              dich an die Regeln in `CLAUDE.md` (im Root).

            WICHTIG (Sicherheit): NUR lesen. Führe KEINEN Projektcode aus, baue/installiere
            nichts, ändere/committe keine Dateien. Die EINZIGE erlaubte Schreibaktion ist
            das Posten eines Issue-Kommentars.

            Sei knapp und hochsignalig. Poste das Ergebnis als EINEN Kommentar via
            `gh issue comment ${{ github.event.issue.number }} --body "..."`.
          # Eng gefasste Allowlist: Lesen + genau die benötigten gh-Issue-Befehle.
          # KEIN Bash(gh:*) (das erlaubte gh api + alle Schreib-Subkommandos).
          settings: |
            {
              "permissions": {
                "allow": [
                  "Read",
                  "Grep",
                  "Glob",
                  "Bash(gh issue view:*)",
                  "Bash(gh issue comment:*)"
                ]
              }
            }
          claude_args: --model claude-opus-4-8 --max-turns 25
